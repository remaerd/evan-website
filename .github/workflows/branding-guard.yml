name: branding-guard

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  branding-guard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run branding verification
        run: |
          chmod +x scripts/verify_branding.sh
          ./scripts/verify_branding.sh
