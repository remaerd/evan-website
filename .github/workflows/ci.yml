name: CI

on:
  push:
    branches: [development, nightly, release]
  pull_request:
    branches: [development, nightly, release]

jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build website
        run: npm run build

  nightly-release-gates:
    name: nightly-release-gates
    runs-on: ubuntu-latest
    needs: test
    if: github.ref_name == 'nightly' || github.ref_name == 'release' || github.base_ref == 'nightly' || github.base_ref == 'release'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run branding verification
        run: |
          chmod +x scripts/verify_branding.sh
          ./scripts/verify_branding.sh

      - name: Checkout evan-contracts
        uses: actions/checkout@v4
        with:
          repository: remaerd/evan-contracts
          path: _contracts

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Validate shared contracts and legal baseline
        run: |
          python -m pip install --upgrade pip
          pip install jsonschema pyyaml
          python _contracts/scripts/validate_contracts.py
          python _contracts/scripts/validate_legal_contracts.py
